<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Note</title>
  <script>
    (function(){var t=localStorage.getItem('qb-theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
  </script>
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Quarterboard">
  <meta name="theme-color" content="#f96302">
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <link rel="stylesheet" href="css/note.css">
</head>
<body>
  <div class="color-bar" id="color-bar">
    <a class="back-btn" id="btn-back" href="notes.html" style="display:none"></a>
    <button class="pin-btn" id="btn-pin" style="display:none">Pin</button>
    <button class="share-btn" id="btn-share" style="display:none"></button>
    <button class="btn-secondary save-btn" id="btn-save" style="display:none">Save</button>
    <button class="pin-btn" id="btn-theme" title="Switch to dark mode" aria-label="Toggle dark mode" style="margin-left:auto"></button>
  </div>

  <div class="content-area" id="content-area">
    <div class="view-render hint" id="view-render" tabindex="0"></div>
    <textarea class="edit-raw" id="edit-raw" placeholder="Type your note here…
Use '- ' at the start of a line for bullet points.
Use '[ ]' or '[x]' at the start of a line for checkboxes.
Type digits alone for a barcode, or 'Label: digits' to label it.
Supported: 6/10-digit Home Depot SKUs, 12-digit UPC, 13-digit EAN."></textarea>
  </div>

  <div class="status-bar" id="status-bar"></div>

  <!-- Share modal -->
  <div class="share-modal" id="share-modal" style="display:none">
    <div class="share-modal-box">
      <div class="share-modal-title">Share Note</div>
      <div id="share-qr"></div>
      <div class="share-code-block">
        <div class="share-code-label">Import code</div>
        <div class="share-code" id="share-code">Creating…</div>
      </div>
      <input class="share-url-input" id="share-url" readonly placeholder="Creating link…">
      <div class="share-modal-actions">
        <button id="btn-copy-code" disabled>Copy Code</button>
        <button id="btn-copy-link" disabled>Copy Link</button>
        <button id="btn-close-share">Close</button>
      </div>
    </div>
  </div>

  <script src="js/icons.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/barcode.js"></script>
  <script src="js/render.js"></script>
  <script>
    const SWATCHES = [
      { color: '#FFF9C4', name: 'Yellow' },
      { color: '#F8BBD0', name: 'Pink' },
      { color: '#BBDEFB', name: 'Blue' },
      { color: '#C8E6C9', name: 'Green' },
      { color: '#FFE0B2', name: 'Orange' },
      { color: '#E1BEE7', name: 'Purple' },
      { color: '#FFFFFF', name: 'White' }
    ];

    let note = null;
    let saveTimer = null;
    let isInEditMode = false;

    function getParam(name) {
      return new URLSearchParams(location.search).get(name);
    }

    function applyColor(color) {
      document.body.style.backgroundColor = color;
      document.body.dataset.noteColor = '1';
      document.getElementById('edit-raw').style.backgroundColor = hexToRgba(color, 0.3);
      const dot = document.querySelector('#btn-color-picker .memo-color-dot');
      if (dot) dot.style.background = color;
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function buildColorPicker() {
      const bar = document.getElementById('color-bar');
      const saveBtn = document.getElementById('btn-save');

      const btn = document.createElement('button');
      btn.className = 'pin-btn memo-color-btn';
      btn.id = 'btn-color-picker';
      btn.title = 'Change note color';

      const dot = document.createElement('span');
      dot.className = 'memo-color-dot';
      dot.style.background = note.color || '#FFF9C4';
      btn.appendChild(dot);
      btn.insertAdjacentHTML('beforeend', icon('palette', 14));

      btn.addEventListener('click', e => {
        e.stopPropagation();
        const existing = btn.querySelector('.memo-color-picker');
        if (existing) { existing.remove(); return; }

        const picker = document.createElement('div');
        picker.className = 'memo-color-picker';

        SWATCHES.forEach(sw => {
          const s = document.createElement('button');
          s.className = 'memo-swatch' + (sw.color === note.color ? ' active' : '');
          s.dataset.color = sw.color;
          s.style.background = sw.color;
          s.title = sw.name;
          s.addEventListener('click', ev => {
            ev.stopPropagation();
            handleColorChange(sw.color);
            dot.style.background = sw.color;
            picker.querySelectorAll('.memo-swatch').forEach(x => x.classList.toggle('active', x.dataset.color === sw.color));
            picker.remove();
          });
          picker.appendChild(s);
        });

        btn.appendChild(picker);
        setTimeout(() => {
          document.addEventListener('click', function close(ev) {
            if (!btn.contains(ev.target)) { picker.remove(); document.removeEventListener('click', close); }
          });
        }, 0);
      });

      bar.insertBefore(btn, saveBtn);
    }

    function handleColorChange(color) {
      note.color = color;
      saveNote(note);
      applyColor(color);
    }

    function updateTitle() {
      const firstLine = (note.content || '').split('\n')[0].trim();
      document.title = firstLine.slice(0, 40) || 'New Note';
    }

    function updateStatus() {
      const d = new Date(note.modified);
      document.getElementById('status-bar').textContent = 'Saved ' + d.toLocaleTimeString();
    }

    function commitAndSave() {
      note.content = document.getElementById('edit-raw').value;
      saveNote(note);
      updateTitle();
      updateStatus();
    }

    function attachCheckHandlers(viewEl) {
      viewEl.querySelectorAll('.check-item input').forEach(cb => {
        cb.addEventListener('click', (e) => {
          e.stopPropagation();
          const lineIdx = parseInt(cb.closest('.check-item').dataset.line);
          const lines = note.content.split('\n');
          if (/^\[ \]/i.test(lines[lineIdx])) {
            lines[lineIdx] = lines[lineIdx].replace(/^\[ \]/i, '[x]');
          } else {
            lines[lineIdx] = lines[lineIdx].replace(/^\[x\]/i, '[ ]');
          }
          note.content = lines.join('\n');
          saveNote(note);
          updateStatus();
          renderView(viewEl);
        });
      });
    }

    function renderView(viewEl) {
      viewEl.innerHTML = '';
      const frag = renderContent(note.content);
      if (!frag.childNodes.length) {
        viewEl.classList.add('hint');
      } else {
        viewEl.classList.remove('hint');
        viewEl.appendChild(frag);
        attachCheckHandlers(viewEl);
      }
    }

    function updatePinBtnState() {
      const btn = document.getElementById('btn-pin');
      if (!btn || !note) return;
      const pinned = localStorage.getItem('sticky-pinned') === note.id;
      btn.innerHTML = icon('pin', 14) + (pinned ? ' Pinned' : ' Pin');
      btn.classList.toggle('pinned', pinned);
    }

    function toggleDashboardPin() {
      const pinned = localStorage.getItem('sticky-pinned') === note.id;
      if (pinned) {
        localStorage.removeItem('sticky-pinned');
      } else {
        localStorage.setItem('sticky-pinned', note.id);
      }
      updatePinBtnState();
    }

    function switchToViewMode() {
      if (!isInEditMode) return;
      isInEditMode = false;
      document.getElementById('btn-save').style.display = 'none';
      document.getElementById('btn-share').style.display = '';
      document.getElementById('btn-pin').style.display = '';
      updatePinBtnState();

      const viewEl = document.getElementById('view-render');
      const textarea = document.getElementById('edit-raw');
      textarea.classList.remove('visible');
      viewEl.classList.remove('hidden');

      renderView(viewEl);
    }

    function switchToEditMode() {
      if (isInEditMode) return;
      isInEditMode = true;
      document.getElementById('btn-save').style.display = '';
      document.getElementById('btn-share').style.display = 'none';
      document.getElementById('btn-pin').style.display = 'none';

      const viewEl = document.getElementById('view-render');
      const textarea = document.getElementById('edit-raw');
      viewEl.classList.add('hidden');
      viewEl.classList.remove('hint');
      textarea.value = note.content;
      textarea.classList.add('visible');
      textarea.focus();
    }

    function scheduleSave() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        note.content = document.getElementById('edit-raw').value;
        saveNote(note);
        updateTitle();
        updateStatus();
      }, 300);
    }

    function buildBase64Url() {
      const payload = btoa(unescape(encodeURIComponent(
        JSON.stringify({ content: note.content, color: note.color })
      )));
      return location.origin + location.pathname + '?import=' + encodeURIComponent(payload);
    }

    async function createShareBlob() {
      const id = crypto.randomUUID().replace(/-/g, '');
      const resp = await fetch('https://mantledb.sh/v2/sticky-notes-share/' + id, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: note.content, color: note.color })
      });
      if (!resp.ok) throw new Error(resp.status);
      return id;
    }

    function closeShareModal() {
      document.getElementById('share-modal').style.display = 'none';
      document.getElementById('btn-copy-code').textContent = 'Copy Code';
      document.getElementById('btn-copy-link').textContent = 'Copy Link';
      document.getElementById('btn-copy-code').disabled = true;
      document.getElementById('btn-copy-link').disabled = true;
      document.getElementById('share-code').style.color = '';
    }

    function initShareHandlers() {
      document.getElementById('btn-share').innerHTML = icon('share', 14) + ' Share';

      document.getElementById('btn-share').addEventListener('click', async () => {
        const baseUrl = buildBase64Url();
        document.getElementById('share-url').value = baseUrl;
        document.getElementById('share-qr').innerHTML = '';
        new QRCode(document.getElementById('share-qr'), {
          text: baseUrl, width: 180, height: 180,
          colorDark: '#000000', colorLight: '#ffffff',
        });
        document.getElementById('btn-copy-link').disabled = false;
        document.getElementById('btn-copy-code').disabled = true;
        document.getElementById('share-code').textContent = 'Generating…';
        document.getElementById('share-code').style.color = '';
        document.getElementById('share-modal').style.display = 'flex';

        try {
          const blobId = await createShareBlob();
          const blobUrl = location.origin + location.pathname + '?gist=' + blobId;
          const p = blobId.match(/.{8}/g);
          document.getElementById('share-code').innerHTML = p[0] + ' ' + p[1] + '<br>' + p[2] + ' ' + p[3];
          document.getElementById('share-code').style.color = '';
          document.getElementById('share-url').value = blobUrl;
          document.getElementById('btn-copy-code').disabled = false;
          document.getElementById('share-qr').innerHTML = '';
          new QRCode(document.getElementById('share-qr'), {
            text: blobUrl, width: 180, height: 180,
            colorDark: '#000000', colorLight: '#ffffff',
          });
        } catch {
          document.getElementById('share-code').textContent = 'Code unavailable';
          document.getElementById('share-code').style.color = '#999';
        }
      });

      document.getElementById('btn-copy-code').addEventListener('click', () => {
        const code = document.getElementById('share-code').textContent.replace(/\s/g, '');
        navigator.clipboard.writeText(code)
          .then(() => { document.getElementById('btn-copy-code').textContent = 'Copied!'; })
          .catch(() => {});
      });

      document.getElementById('btn-copy-link').addEventListener('click', () => {
        navigator.clipboard.writeText(document.getElementById('share-url').value)
          .then(() => { document.getElementById('btn-copy-link').textContent = 'Copied!'; })
          .catch(() => { document.getElementById('share-url').select(); });
      });

      document.getElementById('btn-close-share').addEventListener('click', closeShareModal);
      document.getElementById('share-modal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('share-modal')) closeShareModal();
      });
    }

    async function initGistImportMode(blobId) {
      document.getElementById('color-bar').innerHTML =
        '<span class="import-banner">Loading shared note…</span>';
      try {
        const resp = await fetch('https://mantledb.sh/v2/sticky-notes-share/' + blobId,
          { headers: { 'Accept': 'application/json' } });
        if (!resp.ok) throw new Error();
        initImportMode(await resp.json());
      } catch {
        document.getElementById('color-bar').innerHTML =
          '<span class="import-banner">Could not load note.</span>';
        const viewEl = document.getElementById('view-render');
        viewEl.classList.remove('hint');
        viewEl.textContent = 'This share code is invalid or has expired.';
        document.getElementById('status-bar').textContent = '';
      }
    }

    function initImportMode(payload) {
      note = {
        id: null,
        content: payload.content || '',
        color: payload.color || '#FFF9C4',
        created: Date.now(),
        modified: Date.now()
      };
      document.body.style.backgroundColor = note.color;

      document.getElementById('color-bar').innerHTML =
        '<span class="import-banner">Shared note — </span>' +
        '<button id="btn-import-save">Save to My Notes</button>';

      const viewEl = document.getElementById('view-render');
      viewEl.classList.remove('hint');
      const frag = renderContent(note.content);
      if (frag.childNodes.length) viewEl.appendChild(frag);

      document.title = note.content.split('\n')[0].trim().slice(0, 40) || 'Shared Note';
      document.getElementById('status-bar').textContent = 'Shared note — read only';

      document.getElementById('btn-import-save').addEventListener('click', () => {
        const saved = createNote();
        saved.content = note.content;
        saved.color = note.color;
        saveNote(saved);
        location.href = 'note.html?id=' + encodeURIComponent(saved.id);
      });
    }

    function init() {
      const gistId = getParam('gist');
      if (gistId) { initGistImportMode(gistId); return; }

      const importData = getParam('import');
      if (importData) {
        try {
          const payload = JSON.parse(decodeURIComponent(escape(atob(decodeURIComponent(importData)))));
          if (payload) { initImportMode(payload); return; }
        } catch {}
      }

      const id = getParam('id');
      if (!id) { document.title = 'Error'; document.body.textContent = 'No note ID.'; return; }

      note = getNote(id);
      if (!note) { document.title = 'Not Found'; document.body.textContent = 'Note not found.'; return; }

      buildColorPicker();
      applyColor(note.color || '#FFF9C4');
      updateTitle();
      updateStatus();

      // Back button
      const backBtn = document.getElementById('btn-back');
      if (window.opener === null) {
        backBtn.style.display = '';
        backBtn.innerHTML = icon('back', 14) + ' Notes';
      }

      initShareHandlers();

      document.getElementById('btn-pin').addEventListener('click', toggleDashboardPin);

      isInEditMode = true;
      switchToViewMode();

      document.getElementById('view-render').addEventListener('click', switchToEditMode);
      document.getElementById('view-render').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') switchToEditMode();
      });

      const textarea = document.getElementById('edit-raw');
      textarea.addEventListener('input', scheduleSave);

      document.getElementById('btn-save').addEventListener('click', () => {
        commitAndSave();
        switchToViewMode();
      });

      textarea.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          commitAndSave();
          switchToViewMode();
        }
      });

      textarea.addEventListener('blur', () => {
        commitAndSave();
        switchToViewMode();
      });

      window.addEventListener('storage', (e) => {
        if (e.key === 'sticky-pinned') { updatePinBtnState(); return; }
        if (e.key !== 'sticky-notes') return;
        const updated = getNote(id);
        if (!updated) { window.close(); return; }
        if (updated.color !== note.color) {
          note = updated;
          applyColor(note.color);
        }
      });
    }

    init();
  </script>
</body>
</html>
