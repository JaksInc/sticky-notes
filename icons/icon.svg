<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#f96302"/>
  <!-- Top row: 3 equal widgets -->
  <rect x="8"  y="8"  width="24" height="36" rx="5" fill="white" opacity=".95"/>
  <rect x="38" y="8"  width="24" height="36" rx="5" fill="white" opacity=".92"/>
  <rect x="68" y="8"  width="24" height="36" rx="5" fill="white" opacity=".88"/>
  <!-- Middle row: full-width widget -->
  <rect x="8"  y="50" width="84" height="22" rx="5" fill="white" opacity=".92"/>
  <!-- Bottom row: 2/3 + 1/3 -->
  <rect x="8"  y="78" width="52" height="14" rx="5" fill="white" opacity=".80"/>
  <rect x="66" y="78" width="26" height="14" rx="5" fill="white" opacity=".68"/>
</svg>
