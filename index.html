<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quarterboard</title>
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Quarterboard">
  <meta name="theme-color" content="#f96302">
  <link rel="stylesheet" href="css/index.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
  <div class="toolbar">
    <h1>Dashboard</h1>
    <button class="btn btn-secondary" id="btn-popout" title="Open in popup window">⧉ Pop Out</button>
  </div>

  <div class="widget-grid">

    <!-- Calendar widget -->
    <div class="widget widget-calendar">
      <div class="widget-header">
        <span class="widget-title">📅 Calendar</span>
      </div>
      <div class="widget-body" id="cal-body"></div>
    </div>

    <!-- Pinned note widget -->
    <div class="widget widget-memo">
      <div class="widget-header">
        <span class="widget-title">📌 Pinned Note</span>
        <div class="widget-header-actions" id="memo-header-actions"></div>
      </div>
      <div class="widget-body memo-body" id="memo-body"></div>
    </div>

    <!-- To-Do widget -->
    <div class="widget widget-todos">
      <div class="widget-header">
        <span class="widget-title">✓ To-Do</span>
      </div>
      <div class="widget-body">
        <div class="todo-add">
          <input type="text" id="todo-input" class="todo-input" placeholder="Add a task…" autocomplete="off">
          <button class="btn btn-primary btn-sm" id="todo-add-btn">+</button>
        </div>
        <ul class="todo-list" id="todo-list"></ul>
        <div class="todo-footer" id="todo-footer" style="display:none">
          <span id="todo-count"></span>
          <button class="todo-clear-btn" id="todo-clear-btn">Clear completed</button>
        </div>
      </div>
    </div>

    <!-- Sticky Notes widget -->
    <div class="widget widget-notes">
      <div class="widget-header">
        <span class="widget-title">🗒 Sticky Notes</span>
        <div class="widget-header-actions">
          <button class="btn btn-primary btn-sm" id="notes-new-btn">+ New</button>
          <a href="notes.html" class="btn btn-secondary btn-sm">View All →</a>
        </div>
      </div>
      <div class="widget-body widget-notes-body">
        <div class="grid" id="notes-grid"></div>
        <div class="empty-state notes-empty" id="notes-empty" style="display:none">
          No notes yet — click <strong>+ New</strong> to get started.
        </div>
      </div>
    </div>

  </div>

  <script src="js/storage.js"></script>
  <script src="js/barcode.js"></script>
  <script src="js/render.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
