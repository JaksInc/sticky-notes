<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sticky Notes</title>
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <div class="toolbar">
    <h1>📋 Sticky Notes</h1>
    <button class="btn btn-primary" id="btn-new">+ New Note</button>
    <button class="btn btn-secondary" id="btn-popup" title="Open in popup window">⧉ Pop Out</button>
  </div>
  <div class="grid-container">
    <div class="grid" id="grid"></div>
    <div class="empty-state" id="empty-state" style="display:none">
      No notes yet — click <strong>+ New Note</strong> to get started.
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script>
    const openWindows = new Map();

    function renderGrid() {
      const notes = getAllNotes();
      const grid = document.getElementById('grid');
      const emptyState = document.getElementById('empty-state');
      grid.innerHTML = '';

      if (notes.length === 0) {
        emptyState.style.display = '';
        return;
      }
      emptyState.style.display = 'none';

      for (const note of notes) {
        const card = document.createElement('div');
        card.className = 'card';
        card.style.backgroundColor = note.color || '#FFF9C4';

        const preview = note.content.trim() || '';
        const body = document.createElement('div');
        body.className = 'card-body';
        body.innerHTML = `<div class="card-preview${preview ? '' : ' empty'}">${
          preview ? escapeHtml(preview.slice(0, 300)) : 'Empty note'
        }</div>`;
        body.addEventListener('click', () => openNote(note.id));

        const actions = document.createElement('div');
        actions.className = 'card-actions';

        const openBtn = document.createElement('button');
        openBtn.className = 'card-btn';
        openBtn.title = 'Open note';
        openBtn.textContent = '✎';
        openBtn.addEventListener('click', (e) => { e.stopPropagation(); openNote(note.id); });

        const delBtn = document.createElement('button');
        delBtn.className = 'card-btn delete';
        delBtn.title = 'Delete note';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteNoteUI(note.id); });

        actions.appendChild(openBtn);
        actions.appendChild(delBtn);
        card.appendChild(body);
        card.appendChild(actions);
        grid.appendChild(card);
      }
    }

    function openNote(id) {
      const existing = openWindows.get(id);
      if (existing && !existing.closed) {
        existing.focus();
        return;
      }
      const w = window.open(
        'note.html?id=' + encodeURIComponent(id),
        'note-' + id,
        'popup=1,width=380,height=520,resizable=yes,scrollbars=yes'
      );
      if (w) openWindows.set(id, w);
    }

    function deleteNoteUI(id) {
      if (!confirm('Delete this note?')) return;
      const existing = openWindows.get(id);
      if (existing && !existing.closed) existing.close();
      openWindows.delete(id);
      deleteNote(id);
      renderGrid();
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    document.getElementById('btn-new').addEventListener('click', () => {
      const note = createNote();
      openNote(note.id);
      renderGrid();
    });

    document.getElementById('btn-popup').addEventListener('click', () => {
      window.open(
        'index.html',
        'sticky-main',
        'popup=1,width=820,height=600,resizable=yes'
      );
    });

    // Hide the pop-out button when already running as a popup
    if (window.opener !== null) {
      document.getElementById('btn-popup').style.display = 'none';
    }

    window.addEventListener('focus', renderGrid);
    window.addEventListener('storage', (e) => {
      if (e.key === 'sticky-notes') renderGrid();
    });

    renderGrid();
  </script>
</body>
</html>
