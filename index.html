<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sticky Notes</title>
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Sticky Notes">
  <meta name="theme-color" content="#4a90d9">
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <div class="toolbar">
    <a href="dashboard.html" class="btn btn-secondary toolbar-back">← Dashboard</a>
    <h1>📋 Sticky Notes</h1>
    <input type="search" id="search-input" class="search-input" placeholder="Search notes…" autocomplete="off">
    <button class="btn btn-primary" id="btn-new">+ New Note</button>
    <button class="btn btn-secondary" id="btn-import-code">Import by Code</button>
    <button class="btn btn-secondary" id="btn-export">↓ Export</button>
    <button class="btn btn-secondary" id="btn-import-file">↑ Import</button>
    <input type="file" id="import-file-input" accept=".json" style="display:none">
    <button class="btn btn-secondary" id="btn-view-toggle" title="Switch view">⊞ Grid</button>
    <button class="btn btn-secondary" id="btn-popup" title="Open in popup window">⧉ Pop Out</button>
  </div>
  <!-- Import by code modal -->
  <div class="import-modal" id="import-modal" style="display:none">
    <div class="import-modal-box">
      <div class="import-modal-title">Import Note by Code</div>
      <p class="import-modal-hint">Paste or type the 4-part code from the Share screen</p>
      <div class="code-inputs">
        <div class="code-row">
          <input class="code-chunk" maxlength="8" autocomplete="off" spellcheck="false" inputmode="text">
          <span class="code-sep">·</span>
          <input class="code-chunk" maxlength="8" autocomplete="off" spellcheck="false" inputmode="text">
        </div>
        <div class="code-row">
          <input class="code-chunk" maxlength="8" autocomplete="off" spellcheck="false" inputmode="text">
          <span class="code-sep">·</span>
          <input class="code-chunk" maxlength="8" autocomplete="off" spellcheck="false" inputmode="text">
        </div>
      </div>
      <div class="import-modal-actions">
        <button id="btn-import-go">Import</button>
        <button id="btn-import-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <div class="grid-container">
    <div class="grid" id="grid"></div>
    <div class="empty-state" id="empty-state" style="display:none">
      No notes yet — click <strong>+ New Note</strong> to get started.
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/barcode.js"></script>
  <script src="js/render.js"></script>
  <script>
    const openWindows = new Map();
    let currentView = localStorage.getItem('sticky-notes-view') || 'grid';

    function setView(view) {
      currentView = view;
      localStorage.setItem('sticky-notes-view', view);
      const btn = document.getElementById('btn-view-toggle');
      const gridEl = document.getElementById('grid');
      if (view === 'list') {
        gridEl.className = 'list';
        btn.textContent = '≡ List';
      } else {
        gridEl.className = 'grid';
        btn.textContent = '⊞ Grid';
      }
      renderGrid();
    }

    function isMobile() {
      return window.innerWidth < 768 || 'ontouchstart' in window;
    }

    function renderGrid() {
      const query = document.getElementById('search-input').value.trim().toLowerCase();
      let notes = getAllNotes();
      if (query) notes = notes.filter(n => n.content.toLowerCase().includes(query));

      const grid = document.getElementById('grid');
      const emptyState = document.getElementById('empty-state');
      grid.innerHTML = '';

      if (notes.length === 0) {
        emptyState.style.display = '';
        if (query) {
          emptyState.textContent = `No notes match "${query}"`;
        } else {
          emptyState.innerHTML = 'No notes yet — click <strong>+ New Note</strong> to get started.';
        }
        return;
      }
      emptyState.style.display = 'none';

      for (const note of notes) {
        const openBtn = document.createElement('button');
        openBtn.className = 'card-btn';
        openBtn.title = 'Open note';
        openBtn.textContent = '✎';
        openBtn.addEventListener('click', (e) => { e.stopPropagation(); openNote(note.id); });

        const delBtn = document.createElement('button');
        delBtn.className = 'card-btn delete';
        delBtn.title = 'Delete note';
        delBtn.textContent = '✕';
        delBtn.addEventListener('click', (e) => { e.stopPropagation(); deleteNoteUI(note.id); });

        if (currentView === 'list') {
          const row = document.createElement('div');
          row.className = 'list-row';

          const swatch = document.createElement('div');
          swatch.className = 'list-swatch';
          swatch.style.backgroundColor = note.color || '#FFF9C4';

          const main = document.createElement('div');
          main.className = 'list-main';
          main.addEventListener('click', () => openNote(note.id));

          const titleEl = document.createElement('div');
          titleEl.className = 'list-title';
          titleEl.textContent = note.content.split('\n')[0].trim() || 'Empty note';

          const previewLines = note.content.split('\n').slice(1).filter(l => l.trim()).slice(0, 3);
          if (previewLines.length) {
            const preview = document.createElement('div');
            preview.className = 'list-preview';
            preview.textContent = previewLines.join(' · ');
            main.appendChild(titleEl);
            main.appendChild(preview);
          } else {
            main.appendChild(titleEl);
          }

          const meta = document.createElement('div');
          meta.className = 'list-meta';
          meta.textContent = new Date(note.modified).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
          main.appendChild(meta);

          const actions = document.createElement('div');
          actions.className = 'list-actions';
          actions.appendChild(openBtn);
          actions.appendChild(delBtn);

          row.appendChild(swatch);
          row.appendChild(main);
          row.appendChild(actions);
          grid.appendChild(row);
        } else {
          const card = document.createElement('div');
          card.className = 'card';
          card.style.backgroundColor = note.color || '#FFF9C4';

          const body = document.createElement('div');
          body.className = 'card-body';
          body.addEventListener('click', () => openNote(note.id));

          const previewEl = document.createElement('div');
          previewEl.className = 'card-preview';
          if (note.content.trim()) {
            previewEl.innerHTML = renderPreview(note.content);
          } else {
            previewEl.innerHTML = '<span class="empty">Empty note</span>';
          }
          body.appendChild(previewEl);

          const actions = document.createElement('div');
          actions.className = 'card-actions';
          actions.appendChild(openBtn);
          actions.appendChild(delBtn);

          card.appendChild(body);
          card.appendChild(actions);
          grid.appendChild(card);
        }
      }
    }

    function openNote(id) {
      if (isMobile()) {
        location.href = 'note.html?id=' + encodeURIComponent(id);
        return;
      }
      const existing = openWindows.get(id);
      if (existing && !existing.closed) {
        existing.focus();
        return;
      }
      const w = window.open(
        'note.html?id=' + encodeURIComponent(id),
        'note-' + id,
        'popup=1,width=380,height=520,resizable=yes,scrollbars=yes'
      );
      if (w) openWindows.set(id, w);
    }

    function deleteNoteUI(id) {
      if (!confirm('Delete this note?')) return;
      const existing = openWindows.get(id);
      if (existing && !existing.closed) existing.close();
      openWindows.delete(id);
      deleteNote(id);
      renderGrid();
    }

    document.getElementById('btn-new').addEventListener('click', () => {
      const note = createNote();
      openNote(note.id);
      renderGrid();
    });

    const codeChunks = Array.from(document.querySelectorAll('.code-chunk'));

    function getImportCode() {
      return codeChunks.map(c => c.value).join('');
    }

    function distributeCode(text, fromIndex) {
      const clean = text.replace(/[^0-9a-f]/gi, '').toLowerCase();
      const start = clean.length >= 32 ? 0 : fromIndex;
      let offset = 0;
      for (let i = start; i < codeChunks.length && offset < clean.length; i++) {
        codeChunks[i].value = clean.slice(offset, offset + 8);
        offset += 8;
      }
      const lastFilled = Math.min(start + Math.ceil(clean.length / 8) - 1, codeChunks.length - 1);
      codeChunks[lastFilled].focus();
      if (getImportCode().length >= 32) document.getElementById('btn-import-go').click();
    }

    codeChunks.forEach((input, i) => {
      input.addEventListener('input', () => {
        input.value = input.value.replace(/[^0-9a-f]/gi, '').toLowerCase();
        if (input.value.length === 8) {
          if (i < codeChunks.length - 1) codeChunks[i + 1].focus();
          else document.getElementById('btn-import-go').click();
        }
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && input.value.length === 0 && i > 0) codeChunks[i - 1].focus();
        if (e.key === 'Enter') document.getElementById('btn-import-go').click();
        if (e.key === 'Escape') document.getElementById('import-modal').style.display = 'none';
      });
      input.addEventListener('paste', (e) => {
        e.preventDefault();
        distributeCode((e.clipboardData || window.clipboardData).getData('text'), i);
      });
    });

    document.getElementById('btn-import-code').addEventListener('click', () => {
      codeChunks.forEach(c => c.value = '');
      document.getElementById('import-modal').style.display = 'flex';
      codeChunks[0].focus();
    });

    document.getElementById('btn-import-go').addEventListener('click', () => {
      const code = getImportCode().replace(/\s/g, '');
      if (code.length < 32) return;
      location.href = 'note.html?gist=' + encodeURIComponent(code);
    });

    document.getElementById('btn-import-cancel').addEventListener('click', () => {
      document.getElementById('import-modal').style.display = 'none';
    });

    document.getElementById('import-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('import-modal'))
        document.getElementById('import-modal').style.display = 'none';
    });

    document.getElementById('btn-export').addEventListener('click', () => {
      const json = JSON.stringify(getAllNotes(), null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'sticky-notes-backup-' + new Date().toISOString().slice(0, 10) + '.json';
      a.click();
      URL.revokeObjectURL(url);
    });

    document.getElementById('btn-import-file').addEventListener('click', () => {
      document.getElementById('import-file-input').value = '';
      document.getElementById('import-file-input').click();
    });

    document.getElementById('import-file-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        let imported;
        try {
          imported = JSON.parse(ev.target.result);
          if (!Array.isArray(imported)) throw new Error();
        } catch {
          alert('Invalid backup file.');
          return;
        }
        if (!confirm(`Import ${imported.length} note${imported.length !== 1 ? 's' : ''}? Notes with matching IDs will be overwritten.`)) return;
        const existing = getAllNotes();
        const map = new Map(existing.map(n => [n.id, n]));
        for (const note of imported) {
          if (note.id && note.content !== undefined) map.set(note.id, note);
        }
        const merged = Array.from(map.values()).sort((a, b) => (b.modified || 0) - (a.modified || 0));
        localStorage.setItem('sticky-notes', JSON.stringify(merged));
        renderGrid();
      };
      reader.readAsText(file);
    });

    document.getElementById('btn-popup').addEventListener('click', () => {
      window.open('index.html', 'sticky-main', 'popup=1,width=820,height=600,resizable=yes');
    });

    // Hide popup and pop-out controls when not applicable
    if (window.opener !== null) {
      document.getElementById('btn-popup').style.display = 'none';
    }
    if (isMobile()) {
      document.getElementById('btn-popup').style.display = 'none';
    }

    window.addEventListener('focus', renderGrid);
    window.addEventListener('storage', (e) => {
      if (e.key === 'sticky-notes') renderGrid();
    });

    document.getElementById('search-input').addEventListener('input', renderGrid);
    document.getElementById('search-input').addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        document.getElementById('search-input').value = '';
        renderGrid();
      }
    });

    document.getElementById('btn-view-toggle').addEventListener('click', () => {
      setView(currentView === 'grid' ? 'list' : 'grid');
    });

    setView(currentView);

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' });
    }
  </script>
</body>
</html>
